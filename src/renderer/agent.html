<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent</title>
    <style>
      :root {
        --bg: #f2f6fb;
        --card: #ffffff;
        --ink: #10253f;
        --muted: #5f7591;
        --line: #d4deea;
        --accent: #206cf4;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "SF Pro Text", "Helvetica Neue", sans-serif;
        background: var(--bg);
        color: var(--ink);
        height: 100vh;
        display: grid;
        grid-template-rows: auto auto auto 1fr auto;
      }
      header {
        border-bottom: 1px solid var(--line);
        background: #fff;
        padding: 14px 16px 12px 80px;
      }
      #title { margin: 0; font-size: 18px; }
      #subtitle { margin: 4px 0 0; font-size: 12px; color: var(--muted); }
      .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .header-actions { display: flex; gap: 8px; }
      .action {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--muted);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .action.primary {
        border-color: #91b3f9;
        background: #edf3ff;
        color: #2455c6;
        font-weight: 700;
      }
      .doc-shelf, .model-shelf, .news-shelf {
        border-bottom: 1px solid var(--line);
        background: #f7faff;
        padding: 8px 12px;
      }
      .doc-shelf.empty, .news-shelf.empty { display: none; }
      .shelf-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .doc-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 12px;
        color: var(--muted);
        margin-right: 6px;
        margin-bottom: 6px;
      }
      .doc-remove {
        border: none;
        background: transparent;
        color: #8aa0bd;
        font-size: 13px;
        padding: 0;
        cursor: pointer;
      }
      .model-summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
      }
      .model-meta { color: var(--muted); }
      .model-link {
        border: none;
        background: transparent;
        color: var(--accent);
        font-weight: 700;
        cursor: pointer;
        padding: 0;
      }
      .news-item {
        font-size: 12px;
        color: var(--ink);
        padding: 2px 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #chat {
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg {
        max-width: 78%;
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.45;
        white-space: pre-wrap;
      }
      .user {
        align-self: flex-end;
        background: var(--accent);
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .assistant {
        align-self: flex-start;
        background: var(--card);
        border: 1px solid var(--line);
        border-bottom-left-radius: 4px;
      }
      .status { color: var(--muted); font-size: 12px; }
      .input-wrap {
        border-top: 1px solid var(--line);
        background: #fff;
        padding: 12px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      .input-meta {
        grid-column: 1 / -1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .input-attachments {
        display: none;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .input-attachments.has-image { display: flex; }
      .image-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--line);
        background: #f7faff;
        border-radius: 12px;
        padding: 6px 10px 6px 6px;
      }
      .image-pill img {
        width: 52px;
        height: 52px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid #c9d8ec;
        background: #fff;
      }
      .image-pill-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
        font-size: 11px;
        color: var(--muted);
      }
      .image-pill-text strong {
        font-size: 12px;
        color: var(--ink);
      }
      .image-remove {
        border: none;
        background: transparent;
        color: #8aa0bd;
        font-size: 18px;
        line-height: 1;
        padding: 0;
        cursor: pointer;
      }
      .input-error {
        display: none;
        font-size: 12px;
        color: #b42318;
      }
      .input-error.visible { display: block; }
      textarea {
        width: 100%;
        resize: none;
        max-height: 150px;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 11px;
        font: inherit;
        outline: none;
      }
      button.send {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 10px;
        padding: 0 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .streaming::after {
        content: '▋';
        display: inline-block;
        animation: blink 0.9s step-end infinite;
        margin-left: 1px;
        opacity: 0.7;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-row">
        <div>
          <h1 id="title">Agent</h1>
          <p id="subtitle">Loading...</p>
        </div>
        <div class="header-actions">
          <button class="action" id="clearBtn">Clear chat</button>
          <button class="action primary" id="uploadBtn">Upload</button>
          <button class="action" id="warRoomBtn">War Room</button>
          <button class="action" id="settingsBtn">Settings</button>
        </div>
      </div>
    </header>

    <div class="doc-shelf empty" id="docShelf"></div>
    <div class="model-shelf" id="modelShelf"></div>
    <div class="news-shelf empty" id="newsShelf"></div>
    <main id="chat"></main>

    <div class="input-wrap">
      <div class="input-meta">
        <div class="input-attachments" id="inputAttachments"></div>
        <div class="input-error" id="inputError"></div>
      </div>
      <textarea id="input" placeholder="Ask the agent..."></textarea>
      <button class="send" id="sendBtn">Send</button>
    </div>
    <input id="uploadInput" type="file" accept=".pdf,.docx,.txt,.csv,image/jpeg,image/png,image/webp,image/gif" multiple hidden />

    <script>
      const params = new URLSearchParams(location.search);
      const agentId = params.get('agentId');
      const chat = document.getElementById('chat');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('sendBtn');
      const docShelf = document.getElementById('docShelf');
      const newsShelf = document.getElementById('newsShelf');
      const modelShelf = document.getElementById('modelShelf');
      const uploadInput = document.getElementById('uploadInput');
      const inputAttachments = document.getElementById('inputAttachments');
      const inputError = document.getElementById('inputError');
      let agent = null;
      let messages = [];
      let newsItems = [];
      let sending = false;
      let pendingImage = null;

      const MAX_IMAGE_BYTES = 20 * 1024 * 1024;
      const MAX_IMAGE_EDGE = 1568;

      function setInputError(message = '') {
        inputError.textContent = message;
        inputError.classList.toggle('visible', Boolean(message));
      }

      function renderPendingImage() {
        if (!pendingImage) {
          inputAttachments.className = 'input-attachments';
          inputAttachments.innerHTML = '';
          return;
        }
        inputAttachments.className = 'input-attachments has-image';
        inputAttachments.innerHTML = `
          <div class="image-pill">
            <img src="data:${pendingImage.mimeType};base64,${pendingImage.data}" alt="Uploaded preview" />
            <div class="image-pill-text">
              <strong>${pendingImage.name}</strong>
              <span>${pendingImage.width} × ${pendingImage.height}</span>
            </div>
            <button class="image-remove" id="removeImageBtn" title="Remove image">×</button>
          </div>
        `;
        document.getElementById('removeImageBtn').addEventListener('click', () => {
          pendingImage = null;
          renderPendingImage();
        });
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ''));
          reader.onerror = () => reject(new Error('Failed to read image.'));
          reader.readAsDataURL(file);
        });
      }

      function loadImageElement(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error('Failed to load image.'));
          image.src = src;
        });
      }

      function canvasToJpegBase64(canvas) {
        return new Promise((resolve, reject) => {
          const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
          const prefix = 'data:image/jpeg;base64,';
          if (!dataUrl.startsWith(prefix)) {
            reject(new Error('Failed to encode image.'));
            return;
          }
          resolve(dataUrl.slice(prefix.length));
        });
      }

      async function imageFileToPayload(file) {
        if (file.size > MAX_IMAGE_BYTES) throw new Error('Images must be 20MB or smaller.');
        const sourceUrl = await readFileAsDataUrl(file);
        const image = await loadImageElement(sourceUrl);
        let targetWidth = image.naturalWidth || image.width;
        let targetHeight = image.naturalHeight || image.height;
        const longestEdge = Math.max(targetWidth, targetHeight);
        if (longestEdge > MAX_IMAGE_EDGE) {
          const scale = MAX_IMAGE_EDGE / longestEdge;
          targetWidth = Math.round(targetWidth * scale);
          targetHeight = Math.round(targetHeight * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = targetWidth;
        canvas.height = targetHeight;
        const context = canvas.getContext('2d');
        context.drawImage(image, 0, 0, targetWidth, targetHeight);
        const base64 = await canvasToJpegBase64(canvas);
        return {
          name: file.name,
          mimeType: 'image/jpeg',
          data: base64,
          width: targetWidth,
          height: targetHeight
        };
      }

      async function handleUploadSelection(fileList) {
        const files = Array.from(fileList || []);
        if (!files.length) return;
        setInputError('');

        const imageFiles = files.filter((file) => String(file.type || '').startsWith('image/'));
        const docPaths = files
          .filter((file) => !String(file.type || '').startsWith('image/'))
          .map((file) => file.path)
          .filter(Boolean);

        if (docPaths.length) {
          await window.desk.uploadDocuments(agentId, docPaths);
          await renderDocs();
        }

        if (imageFiles.length) {
          if (imageFiles.length > 1) setInputError('One image at a time. The latest selection replaced the earlier one.');
          pendingImage = await imageFileToPayload(imageFiles[imageFiles.length - 1]);
          renderPendingImage();
        }

        uploadInput.value = '';
      }

      function sanitizeAssistantText(text) {
        return String(text).replace(/^\s*(?:\[[A-Z0-9_-]+\]:\s*)+/i, '');
      }

      function appendMessage(role, content, streaming = false) {
        const bubble = document.createElement('div');
        bubble.className = `msg ${role}` + (streaming ? ' streaming' : '');
        bubble.textContent = content;
        chat.appendChild(bubble);
        chat.scrollTop = chat.scrollHeight;
        return bubble;
      }

      function renderMessages() {
        chat.innerHTML = '';
        messages.forEach((msg) => appendMessage(msg.role, msg.content));
      }

      async function renderModel() {
        const model = await window.desk.getModel(agentId);
        if (!model) {
          modelShelf.innerHTML = `
            <div class="model-summary">
              <div>No saved model state.</div>
              <button class="model-link" id="editModelBtn">Edit</button>
            </div>
          `;
          document.getElementById('editModelBtn').addEventListener('click', editModel);
          return;
        }
        modelShelf.innerHTML = `
          <div class="shelf-label">Model State</div>
          <div class="model-summary">
            <div>
              <div>${model.currentStance} · bull ${model.targets.bull.price} · base ${model.targets.base.price} · bear ${model.targets.bear.price}</div>
              <div class="model-meta">${model.lastReviewNote}</div>
            </div>
            <div>
              <button class="model-link" id="editModelBtn">Edit</button>
              <button class="model-link" id="clearModelBtn">Clear</button>
            </div>
          </div>
        `;
        document.getElementById('editModelBtn').addEventListener('click', editModel);
        document.getElementById('clearModelBtn').addEventListener('click', async () => {
          await window.desk.clearModel(agentId);
          renderModel();
        });
      }

      async function editModel() {
        const current = await window.desk.getModel(agentId) || {
          currentStance: 'neutral',
          targets: { bull: { price: 0, label: '' }, base: { price: 0, label: '' }, bear: { price: 0, label: '' } },
          keyAssumptions: [],
          catalysts: [],
          lastReviewNote: ''
        };
        const currentStance = prompt('Current stance', current.currentStance);
        if (!currentStance) return;
        const bullPrice = prompt('Bull price', current.targets.bull.price);
        const bullLabel = prompt('Bull label', current.targets.bull.label);
        const basePrice = prompt('Base price', current.targets.base.price);
        const baseLabel = prompt('Base label', current.targets.base.label);
        const bearPrice = prompt('Bear price', current.targets.bear.price);
        const bearLabel = prompt('Bear label', current.targets.bear.label);
        const assumptions = prompt('Key assumptions, separated by |', (current.keyAssumptions || []).join(' | '));
        const review = prompt('Last review note', current.lastReviewNote || '');
        const result = await window.desk.saveModel(agentId, {
          currentStance,
          targets: {
            bull: { price: Number(bullPrice), label: bullLabel || '' },
            base: { price: Number(basePrice), label: baseLabel || '' },
            bear: { price: Number(bearPrice), label: bearLabel || '' }
          },
          keyAssumptions: String(assumptions || '').split('|').map((s) => s.trim()).filter(Boolean),
          catalysts: current.catalysts || [],
          lastReviewNote: review || ''
        });
        if (result.error) {
          alert(result.error);
          return;
        }
        renderModel();
      }

      async function renderDocs() {
        const fresh = await window.desk.getAgent(agentId);
        agent = fresh;
        const docs = fresh.documents || [];
        if (!docs.length) {
          docShelf.className = 'doc-shelf empty';
          docShelf.innerHTML = '';
          return;
        }
        docShelf.className = 'doc-shelf';
        docShelf.innerHTML = `
          <div class="shelf-label">Documents</div>
          ${docs.map((doc, i) => `<span class="doc-chip">${doc.name}<button class="doc-remove" data-index="${i}">×</button></span>`).join('')}
        `;
        docShelf.querySelectorAll('.doc-remove').forEach((btn) => {
          btn.addEventListener('click', async () => {
            await window.desk.removeDocument(agentId, Number(btn.dataset.index));
            renderDocs();
          });
        });
      }

      function renderNews() {
        if (!newsItems.length) {
          newsShelf.className = 'news-shelf empty';
          newsShelf.innerHTML = '';
          return;
        }
        newsShelf.className = 'news-shelf';
        newsShelf.innerHTML = `<div class="shelf-label">News Shelf</div>${newsItems.map((item) => `<div class="news-item">${item}</div>`).join('')}`;
      }

      async function send() {
        const text = input.value.trim();
        if ((!text && !pendingImage) || sending) return;
        input.value = '';
        sending = true;
        sendBtn.disabled = true;
        setInputError('');

        const userMsg = { role: 'user', content: text };
        const imagePayload = pendingImage ? { mimeType: pendingImage.mimeType, data: pendingImage.data } : null;
        const outbound = { text, image: imagePayload };
        const visibleUserText = outbound.text ? (outbound.image ? `${outbound.text}\n[Image attached]` : outbound.text) : '[Image attached]';
        pendingImage = null;
        renderPendingImage();
        messages.push(userMsg);
        appendMessage('user', visibleUserText);

        const bubble = appendMessage('assistant', '', true);
        let fullText = '';
        window.desk.offStream();
        window.desk.onStreamChunk(({ chunk }) => {
          fullText += chunk;
          bubble.textContent = fullText;
          chat.scrollTop = chat.scrollHeight;
        });
        window.desk.onStreamSearching(({ query }) => {
          bubble.textContent = `Searching: ${query}`;
        });
        window.desk.onStreamError(({ error }) => {
          bubble.classList.remove('streaming');
          bubble.textContent = `Error: ${error}`;
          sending = false;
          sendBtn.disabled = false;
        });
        window.desk.onStreamDone(async () => {
          bubble.classList.remove('streaming');
          bubble.textContent = sanitizeAssistantText(fullText);
          messages.push({ role: 'assistant', content: sanitizeAssistantText(fullText) });
          await window.desk.saveMessages(agentId, messages);
          sending = false;
          sendBtn.disabled = false;
        });
        window.desk.startStream(agentId, messages, newsItems, {}, false, outbound.image);
      }

      async function init() {
        agent = await window.desk.getAgent(agentId);
        messages = await window.desk.getMessages(agentId);
        newsItems = await window.desk.fetchNews(agentId);
        document.getElementById('title').textContent = agent.name;
        document.getElementById('subtitle').textContent = `${agent.company} · ${agent.type}`;
        renderMessages();
        renderNews();
        renderDocs();
        renderModel();
      }

      document.getElementById('sendBtn').addEventListener('click', send);
      document.getElementById('input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });
      document.getElementById('clearBtn').addEventListener('click', async () => {
        messages = [];
        await window.desk.clearMessages(agentId);
        renderMessages();
      });
      document.getElementById('uploadBtn').addEventListener('click', () => uploadInput.click());
      uploadInput.addEventListener('change', async (event) => {
        try {
          await handleUploadSelection(event.target.files);
        } catch (error) {
          setInputError(error.message || 'Upload failed.');
          uploadInput.value = '';
        }
      });
      document.getElementById('settingsBtn').addEventListener('click', () => window.desk.openAgent('__settings__'));
      document.getElementById('warRoomBtn').addEventListener('click', () => window.desk.openAgent('__warroom__'));

      init();
    </script>
  </body>
</html>
