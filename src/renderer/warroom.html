<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>War Room</title>
    <style>
      :root {
        --bg: #f2f6fb;
        --card: #ffffff;
        --ink: #10253f;
        --muted: #5f7591;
        --line: #d4deea;
        --accent: #206cf4;
        --sidebar-w: 230px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "SF Pro Text", "Helvetica Neue", sans-serif;
        background: var(--bg);
        color: var(--ink);
        height: 100vh;
        display: grid;
        grid-template-columns: var(--sidebar-w) 1fr;
        grid-template-rows: auto auto 1fr auto;
      }
      header {
        grid-column: 1 / -1;
        border-bottom: 1px solid var(--line);
        background: #fff;
        padding: 14px 16px 12px 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header-left h1 { margin: 0; font-size: 18px; }
      .header-left p { margin: 3px 0 0; font-size: 12px; color: var(--muted); }
      .header-actions { display: flex; gap: 8px; }
      .action {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--muted);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .action.primary {
        border-color: #91b3f9;
        background: #edf3ff;
        color: #2455c6;
        font-weight: 700;
      }
      .doc-shelf {
        grid-column: 2;
        border-bottom: 1px solid var(--line);
        background: #f7faff;
        padding: 7px 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .doc-shelf.empty { display: none; }
      .doc-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 9px;
        font-size: 12px;
        color: var(--muted);
      }
      .doc-remove {
        border: none;
        background: transparent;
        color: #8aa0bd;
        font-size: 13px;
        padding: 0;
        cursor: pointer;
      }
      .sidebar {
        grid-column: 1;
        grid-row: 2 / 5;
        border-right: 1px solid var(--line);
        background: #fff;
        overflow-y: auto;
        padding: 10px 8px;
      }
      .sidebar-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--muted);
        text-transform: uppercase;
        padding: 6px 8px 4px;
      }
      .agent-btn {
        width: 100%;
        display: flex;
        align-items: flex-start;
        gap: 8px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: transparent;
        padding: 8px;
        cursor: pointer;
        text-align: left;
        margin-bottom: 2px;
        font-family: inherit;
      }
      .agent-btn.active { background: #eef4ff; border-color: #b3ccff; }
      .agent-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
      .agent-btn-name { font-size: 13px; font-weight: 700; color: var(--ink); }
      .agent-btn-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
      .agent-model { font-size: 10px; color: var(--muted); margin-top: 3px; }
      #chat {
        grid-column: 2;
        grid-row: 3;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg-wrap { display: flex; flex-direction: column; }
      .msg-wrap.user { align-items: flex-end; }
      .msg-wrap.assistant { align-items: flex-start; }
      .msg-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.05em;
        margin-bottom: 3px;
        padding: 0 4px;
      }
      .msg {
        max-width: 76%;
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.45;
        white-space: pre-wrap;
      }
      .msg.user {
        background: var(--accent);
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .msg.assistant {
        background: var(--card);
        border: 1px solid var(--line);
        border-bottom-left-radius: 4px;
      }
      .streaming::after {
        content: '▋';
        display: inline-block;
        animation: blink 0.9s step-end infinite;
        margin-left: 1px;
        opacity: 0.7;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .input-wrap {
        grid-column: 2;
        grid-row: 4;
        border-top: 1px solid var(--line);
        background: #fff;
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .input-attachments {
        display: none;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .input-attachments.has-image { display: flex; }
      .image-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--line);
        background: #f7faff;
        border-radius: 12px;
        padding: 6px 10px 6px 6px;
      }
      .image-pill img {
        width: 52px;
        height: 52px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid #c9d8ec;
        background: #fff;
      }
      .image-pill-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
        font-size: 11px;
        color: var(--muted);
      }
      .image-pill-text strong {
        font-size: 12px;
        color: var(--ink);
      }
      .image-remove {
        border: none;
        background: transparent;
        color: #8aa0bd;
        font-size: 18px;
        line-height: 1;
        padding: 0;
        cursor: pointer;
      }
      .input-error {
        display: none;
        font-size: 12px;
        color: #b42318;
      }
      .input-error.visible { display: block; }
      .speaking-to { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); font-weight: 600; }
      .speaking-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 700;
        color: #fff;
      }
      .input-row { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; }
      textarea {
        width: 100%;
        resize: none;
        max-height: 120px;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 11px;
        font: inherit;
        font-size: 14px;
        outline: none;
      }
      .send-btn, .ask-all-btn {
        border-radius: 10px;
        padding: 0 16px;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }
      .send-btn {
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
      }
      .ask-all-btn {
        border: 1px solid #b45309;
        background: #fef3c7;
        color: #92400e;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left">
        <h1>War Room</h1>
        <p id="modelStatus">Loading...</p>
      </div>
      <div class="header-actions">
        <button class="action" id="clearBtn">Clear</button>
        <button class="action primary" id="uploadBtn">Upload</button>
        <button class="action" id="settingsBtn">Settings</button>
      </div>
    </header>

    <aside class="sidebar" id="sidebar"></aside>
    <div class="doc-shelf empty" id="docShelf"></div>
    <main id="chat"></main>

      <div class="input-wrap">
        <div class="speaking-to">Speaking to: <span class="speaking-badge" id="speakingBadge">—</span></div>
        <div class="input-attachments" id="inputAttachments"></div>
        <div class="input-error" id="inputError"></div>
        <div class="input-row">
          <textarea id="input" placeholder="Address the selected agent..."></textarea>
          <button class="ask-all-btn" id="askAllBtn">⬡ Ask All</button>
          <button class="send-btn" id="sendBtn">Send</button>
        </div>
      </div>
      <input id="uploadInput" type="file" accept=".pdf,.docx,.txt,.csv,image/jpeg,image/png,image/webp,image/gif" multiple hidden />

    <script>
      const AGENT_COLORS = {
        NIGO: '#0f766e',
        MURAKAMI: '#2563eb',
        QUICCS: '#7c3aed',
        CHIEF: '#1e3a5f',
        DEPUTY: '#991b1b'
      };

      const chat = document.getElementById('chat');
      const input = document.getElementById('input');
      const sendBtn = document.getElementById('sendBtn');
      const askAllBtn = document.getElementById('askAllBtn');
      const speakingBadge = document.getElementById('speakingBadge');
      const uploadInput = document.getElementById('uploadInput');
      const inputAttachments = document.getElementById('inputAttachments');
      const inputError = document.getElementById('inputError');
      let agents = [];
      let messages = [];
      let activeAgentId = null;
      let sending = false;
      let warRoomDocs = [];
      let pendingImage = null;

      const MAX_IMAGE_BYTES = 20 * 1024 * 1024;
      const MAX_IMAGE_EDGE = 1568;

      function colorFor(agentId) {
        return AGENT_COLORS[agentId] || '#206cf4';
      }

      function setInputError(message = '') {
        inputError.textContent = message;
        inputError.classList.toggle('visible', Boolean(message));
      }

      function renderPendingImage() {
        if (!pendingImage) {
          inputAttachments.className = 'input-attachments';
          inputAttachments.innerHTML = '';
          return;
        }
        inputAttachments.className = 'input-attachments has-image';
        inputAttachments.innerHTML = `
          <div class="image-pill">
            <img src="data:${pendingImage.mimeType};base64,${pendingImage.data}" alt="Uploaded preview" />
            <div class="image-pill-text">
              <strong>${pendingImage.name}</strong>
              <span>${pendingImage.width} × ${pendingImage.height}</span>
            </div>
            <button class="image-remove" id="removeImageBtn" title="Remove image">×</button>
          </div>
        `;
        document.getElementById('removeImageBtn').addEventListener('click', () => {
          pendingImage = null;
          renderPendingImage();
        });
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ''));
          reader.onerror = () => reject(new Error('Failed to read image.'));
          reader.readAsDataURL(file);
        });
      }

      function loadImageElement(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error('Failed to load image.'));
          image.src = src;
        });
      }

      function canvasToJpegBase64(canvas) {
        return new Promise((resolve, reject) => {
          const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
          const prefix = 'data:image/jpeg;base64,';
          if (!dataUrl.startsWith(prefix)) {
            reject(new Error('Failed to encode image.'));
            return;
          }
          resolve(dataUrl.slice(prefix.length));
        });
      }

      async function imageFileToPayload(file) {
        if (file.size > MAX_IMAGE_BYTES) throw new Error('Images must be 20MB or smaller.');
        const sourceUrl = await readFileAsDataUrl(file);
        const image = await loadImageElement(sourceUrl);
        let targetWidth = image.naturalWidth || image.width;
        let targetHeight = image.naturalHeight || image.height;
        const longestEdge = Math.max(targetWidth, targetHeight);
        if (longestEdge > MAX_IMAGE_EDGE) {
          const scale = MAX_IMAGE_EDGE / longestEdge;
          targetWidth = Math.round(targetWidth * scale);
          targetHeight = Math.round(targetHeight * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = targetWidth;
        canvas.height = targetHeight;
        const context = canvas.getContext('2d');
        context.drawImage(image, 0, 0, targetWidth, targetHeight);
        const base64 = await canvasToJpegBase64(canvas);
        return {
          name: file.name,
          mimeType: 'image/jpeg',
          data: base64,
          width: targetWidth,
          height: targetHeight
        };
      }

      async function handleUploadSelection(fileList) {
        const files = Array.from(fileList || []);
        if (!files.length) return;
        setInputError('');

        const imageFiles = files.filter((file) => String(file.type || '').startsWith('image/'));
        const docPaths = files
          .filter((file) => !String(file.type || '').startsWith('image/'))
          .map((file) => file.path)
          .filter(Boolean);

        if (docPaths.length) {
          await window.desk.uploadWarRoomDocuments(docPaths);
          await renderDocs();
        }

        if (imageFiles.length) {
          if (imageFiles.length > 1) setInputError('One image at a time. The latest selection replaced the earlier one.');
          pendingImage = await imageFileToPayload(imageFiles[imageFiles.length - 1]);
          renderPendingImage();
        }

        uploadInput.value = '';
      }

      function setActiveAgent(agentId) {
        activeAgentId = agentId;
        speakingBadge.textContent = agentId;
        speakingBadge.style.background = colorFor(agentId);
        document.querySelectorAll('.agent-btn').forEach((btn) => btn.classList.toggle('active', btn.dataset.id === agentId));
      }

      function sanitizeAssistantText(text) {
        return String(text).replace(/^\s*\[(?:[A-Z0-9_-]+)\]:\s*/i, '');
      }

      function trimMessages(list) {
        return list.length > 320 ? list.slice(-320) : list;
      }

      function appendUserMsg(content) {
        const wrap = document.createElement('div');
        wrap.className = 'msg-wrap user';
        const bubble = document.createElement('div');
        bubble.className = 'msg user';
        bubble.textContent = content;
        wrap.appendChild(bubble);
        chat.appendChild(wrap);
        chat.scrollTop = chat.scrollHeight;
      }

      function appendAgentBubble(agentId) {
        const wrap = document.createElement('div');
        wrap.className = 'msg-wrap assistant';
        const label = document.createElement('div');
        label.className = 'msg-label';
        label.style.color = colorFor(agentId);
        const agent = agents.find((a) => a.id === agentId);
        label.textContent = agent ? `${agent.name} · ${agent.company}` : agentId;
        const bubble = document.createElement('div');
        bubble.className = 'msg assistant streaming';
        wrap.appendChild(label);
        wrap.appendChild(bubble);
        chat.appendChild(wrap);
        chat.scrollTop = chat.scrollHeight;
        return bubble;
      }

      function renderMessages() {
        chat.innerHTML = '';
        messages.forEach((m) => {
          if (m.role === 'user') {
            appendUserMsg(m.content);
            return;
          }
          const bubble = appendAgentBubble(m.agentId);
          bubble.classList.remove('streaming');
          bubble.textContent = m.content;
        });
      }

      async function renderSidebar() {
        const models = await Promise.all(agents.map((a) => window.desk.getModel(a.id)));
        document.getElementById('modelStatus').textContent = `${agents.length} agents online`;
        document.getElementById('sidebar').innerHTML = `
          <div class="sidebar-label">Agents</div>
          ${agents.map((agent, index) => `
            <button class="agent-btn" data-id="${agent.id}">
              <span class="agent-dot" style="background:${colorFor(agent.id)}"></span>
              <span>
                <div class="agent-btn-name">${agent.name}</div>
                <div class="agent-btn-sub">${agent.company}</div>
                <div class="agent-model">${agent.type}${models[index] ? ` · ${models[index].currentStance}` : ''}</div>
              </span>
            </button>
          `).join('')}
        `;
        document.querySelectorAll('.agent-btn').forEach((btn) => btn.addEventListener('click', () => setActiveAgent(btn.dataset.id)));
        if (!activeAgentId && agents.length) setActiveAgent(agents[0].id);
      }

      async function renderDocs() {
        warRoomDocs = await window.desk.getWarRoomDocuments();
        const shelf = document.getElementById('docShelf');
        if (!warRoomDocs.length) {
          shelf.className = 'doc-shelf empty';
          shelf.innerHTML = '';
          return;
        }
        shelf.className = 'doc-shelf';
        shelf.innerHTML = warRoomDocs.map((doc, i) => `<span class="doc-chip">${doc.name}<button class="doc-remove" data-index="${i}">×</button></span>`).join('');
        shelf.querySelectorAll('.doc-remove').forEach((btn) => btn.addEventListener('click', async () => {
          await window.desk.removeWarRoomDocument(Number(btn.dataset.index));
          renderDocs();
        }));
      }

      function buildWarRoomMessagesForAgent(targetAgentId) {
        const llmMessages = [];
        for (const m of messages) {
          if (m.role === 'user') {
            llmMessages.push({ role: 'user', content: m.content });
            continue;
          }
          if (m.agentId === targetAgentId) {
            llmMessages.push({ role: 'assistant', content: m.content });
          } else {
            llmMessages.push({ role: 'user', content: `[War Room transcript - ${m.agentId} said]: ${m.content}` });
          }
        }
        return llmMessages;
      }

      async function send() {
        const text = input.value.trim();
        if ((!text && !pendingImage) || sending || !activeAgentId) return;
        input.value = '';
        setInputError('');
        const imagePayload = pendingImage ? { mimeType: pendingImage.mimeType, data: pendingImage.data } : null;
        const outbound = { text, image: imagePayload };
        const visibleUserText = outbound.text ? (outbound.image ? `${outbound.text}\n[Image attached]` : outbound.text) : '[Image attached]';
        appendUserMsg(visibleUserText);
        messages.push({ role: 'user', content: text, timestamp: Date.now() });
        messages = trimMessages(messages);
        await window.desk.saveWarRoomMessages(messages);
        pendingImage = null;
        renderPendingImage();

        sending = true;
        sendBtn.disabled = true;
        askAllBtn.disabled = true;
        const bubble = appendAgentBubble(activeAgentId);
        let fullText = '';

        window.desk.offStream();
        window.desk.onStreamChunk(({ chunk }) => {
          fullText += chunk;
          bubble.textContent = fullText;
        });
        window.desk.onStreamSearching(({ query }) => {
          bubble.textContent = `Searching: ${query}`;
        });
        window.desk.onStreamError(({ error }) => {
          bubble.classList.remove('streaming');
          bubble.textContent = `Error: ${error}`;
          sending = false;
          sendBtn.disabled = false;
          askAllBtn.disabled = false;
        });
        window.desk.onStreamDone(async () => {
          bubble.classList.remove('streaming');
          const clean = sanitizeAssistantText(fullText);
          bubble.textContent = clean;
          messages.push({ role: 'assistant', agentId: activeAgentId, content: clean, timestamp: Date.now() });
          messages = trimMessages(messages);
          await window.desk.saveWarRoomMessages(messages);
          sending = false;
          sendBtn.disabled = false;
          askAllBtn.disabled = false;
        });
        window.desk.startStream(activeAgentId, buildWarRoomMessagesForAgent(activeAgentId), [], {}, true, outbound.image);
      }

      async function askAll() {
        const text = input.value.trim();
        if ((!text && !pendingImage) || sending) return;
        input.value = '';
        setInputError('');
        const imagePayload = pendingImage ? { mimeType: pendingImage.mimeType, data: pendingImage.data } : null;
        const outbound = { text, image: imagePayload };
        const visibleUserText = outbound.text ? (outbound.image ? `${outbound.text}\n[Image attached]` : outbound.text) : '[Image attached]';
        appendUserMsg(visibleUserText);
        messages.push({ role: 'user', content: text, timestamp: Date.now() });
        messages = trimMessages(messages);
        await window.desk.saveWarRoomMessages(messages);
        pendingImage = null;
        renderPendingImage();
        sending = true;
        sendBtn.disabled = true;
        askAllBtn.disabled = true;

        const bubbles = new Map();
        window.desk.offAskAll();
        window.desk.onAskAllAgentChunk(({ agentId, chunk }) => {
          if (!bubbles.has(agentId)) bubbles.set(agentId, appendAgentBubble(agentId));
          const bubble = bubbles.get(agentId);
          bubble.textContent += chunk;
        });
        window.desk.onAskAllAgentSearching(({ agentId, query }) => {
          if (!bubbles.has(agentId)) bubbles.set(agentId, appendAgentBubble(agentId));
          bubbles.get(agentId).textContent = `Searching: ${query}`;
        });
        window.desk.onAskAllAgentDone(async ({ agentId, text }) => {
          if (!bubbles.has(agentId)) bubbles.set(agentId, appendAgentBubble(agentId));
          const bubble = bubbles.get(agentId);
          bubble.classList.remove('streaming');
          bubble.textContent = sanitizeAssistantText(text);
          messages.push({ role: 'assistant', agentId, content: sanitizeAssistantText(text), timestamp: Date.now() });
          messages = trimMessages(messages);
          await window.desk.saveWarRoomMessages(messages);
        });
        window.desk.onAskAllAgentError(({ agentId, error }) => {
          if (!bubbles.has(agentId)) bubbles.set(agentId, appendAgentBubble(agentId));
          const bubble = bubbles.get(agentId);
          bubble.classList.remove('streaming');
          bubble.textContent = `Error: ${error}`;
        });
        window.desk.onAskAllComplete(async () => {
          sending = false;
          sendBtn.disabled = false;
          askAllBtn.disabled = false;
          await window.desk.saveWarRoomMessages(messages);
        });
        window.desk.onAskAllError(({ error }) => {
          alert(error);
          sending = false;
          sendBtn.disabled = false;
          askAllBtn.disabled = false;
        });
        window.desk.askAll(outbound.text, {}, outbound.image);
      }

      async function init() {
        agents = await window.desk.getAgents();
        messages = await window.desk.getWarRoomMessages();
        await renderSidebar();
        await renderDocs();
        renderMessages();
      }

      document.getElementById('sendBtn').addEventListener('click', send);
      document.getElementById('askAllBtn').addEventListener('click', askAll);
      document.getElementById('clearBtn').addEventListener('click', async () => {
        messages = [];
        await window.desk.clearWarRoomMessages();
        renderMessages();
      });
      document.getElementById('uploadBtn').addEventListener('click', () => uploadInput.click());
      uploadInput.addEventListener('change', async (event) => {
        try {
          await handleUploadSelection(event.target.files);
        } catch (error) {
          setInputError(error.message || 'Upload failed.');
          uploadInput.value = '';
        }
      });
      document.getElementById('settingsBtn').addEventListener('click', () => window.desk.openAgent('__settings__'));
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });

      init();
    </script>
  </body>
</html>
